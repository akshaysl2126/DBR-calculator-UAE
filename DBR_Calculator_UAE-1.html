<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Mwole 💋</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ffc0cb, #ffe4ec);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
}

.container {
  background: white;
  padding: 20px;
  border-radius: 20px;
  width: 90%;
  max-width: 400px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

h1 {
  color: #ff4d88;
}

.slider {
  position: relative;
  width: 100%;
  height: 180px;
  overflow: hidden;
  border-radius: 15px;
}

.slider img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  display: none;
}

.slider img.active {
  display: block;
}

.buttons {
  margin-top: 20px;
}

button {
  padding: 12px 20px;
  font-size: 16px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  margin: 10px;
}

.yes {
  background-color: #ff4d88;
  color: white;
}

.no {
  background-color: #ccc;
}
</style>
</head>

<body>

<div class="container">
  <h1>Mwole 💋</h1>
  <p>Can I please buy an Alexa for us? 🥺</p>

  <!-- Image Slider -->
  <div class="slider">
    <img src="https://m.media-amazon.com/images/I/71w0gL6tS-L._AC_SL1500_.jpg" class="active">
    <img src="https://m.media-amazon.com/images/I/61u48FEsJ0L._AC_SL1000_.jpg">
    <img src="https://m.media-amazon.com/images/I/61EXU8BuGZL._AC_SL1000_.jpg">
    <img src="https://m.media-amazon.com/images/I/71t3W9z7fBL._AC_SL1500_.jpg">
  </div>

  <div class="buttons">
    <button class="yes" onclick="yesClick()">Yes 💖</button>
    <button class="no" id="noBtn">No 😢</button>
  </div>
</div>

<script>
// WhatsApp redirect
function yesClick() {
  const message = encodeURIComponent("Ettan vangiko ennik oru preshanvum illa 💋💋💋");
  window.location.href = "https://wa.me/918891143981?text=" + message;
}

// Moving NO button
const noBtn = document.getElementById("noBtn");
noBtn.addEventListener("mouseover", () => {
  const x = Math.random() * window.innerWidth * 0.7;
  const y = Math.random() * window.innerHeight * 0.7;
  noBtn.style.position = "absolute";
  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
});

// Image slider auto change
let index = 0;
const images = document.querySelectorAll(".slider img");

setInterval(() => {
  images[index].classList.remove("active");
  index = (index + 1) % images.length;
  images[index].classList.add("active");
}, 2000);
</script>

</body>
</html>
